name: Daily data update

on:
  workflow_dispatch:
    inputs:
      dump_leagues:
        description: "Also dump API-Football leagues to data/apifootball_leagues_dump.json (uses API calls)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "15 03 * * *" # daily at 03:15 UTC

permissions:
  contents: write

concurrency:
  group: daily-data-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Clean generated data folders
        run: |
          rm -f data/index.json || true
          rm -rf data/leagues data/history data/corners data/cards data/fixtures || true
          mkdir -p data/leagues data/history data/corners data/cards data/fixtures

      - name: Build history/leagues (football-data)
        run: node scripts/build-data.js

      - name: Build fixtures (API-Football)
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: node scripts/apifootball-build-fixtures.js

      - name: Dump API-Football leagues (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dump_leagues == 'true' }}
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: node scripts/apifootball-dump-leagues.js

      - name: Commit & push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/index.json data/leagues data/history data/corners data/cards data/fixtures
          if [ -f data/apifootball_leagues_dump.json ]; then
            git add data/apifootball_leagues_dump.json
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Daily data update"
          git push
