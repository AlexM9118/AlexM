name: Daily data update

on:
  schedule:
    - cron: "15 3 * * *"   # daily 03:15 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Debug list files
        run: |
          echo "BRANCH: $GITHUB_REF"
          pwd
          ls -la
          echo "---- scripts ----"
          ls -la scripts || true
          echo "---- find ----"
          find . -maxdepth 4 -type f | sort
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build data JSON
        run: node scripts/build-data.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.json data/leagues data/matches data/history data/corners data/cards
          git diff --cached --quiet || git commit -m "Daily data update"
          git push
