name: Daily data update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 03 * * *"  # daily 03:15 UTC

permissions:
  contents: write

concurrency:
  group: daily-data-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Clean generated data folders
        run: |
          rm -f data/index.json || true
          rm -rf data/leagues data/history data/corners data/cards data/fixtures data/apifootball_resolved_leagues.json || true
          mkdir -p data/leagues data/history data/corners data/cards data/fixtures scripts

      # ---------------------------
      # Write the fixtures script (embedded)
      # ---------------------------
      - name: Write API-Football fixtures script
        run: |
          cat > scripts/apifootball-build-fixtures-auto.js <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const API_BASE = "https://v3.football.api-sports.io";
          const WINDOW_DAYS = 5;
          const PREFERRED_SEASON = 2025; // try 2025 first, fallback to latest available

          const TARGET_LEAGUES = [
            { id: "epl",      name: "Premier League", country: "England" },
            { id: "champ",    name: "Championship",   country: "England" },

            { id: "seriea",   name: "Serie A",        country: "Italy" },
            { id: "serieb",   name: "Serie B",        country: "Italy" },

            { id: "bundesliga", name: "Bundesliga",     country: "Germany" },
            { id: "bund2",      name: "2. Bundesliga",  country: "Germany" },

            { id: "laliga",   name: "La Liga",        country: "Spain" },
            { id: "laliga2",  name: "La Liga 2",       country: "Spain" },

            { id: "ligue1",   name: "Ligue 1",        country: "France" },
            { id: "ligue2",   name: "Ligue 2",        country: "France" },

            { id: "ro1",      name: "Liga I",         country: "Romania" }
          ];

          function ensureDir(p){ fs.mkdirSync(p, { recursive: true }); }

          function todayUTC(){
            const n = new Date();
            return new Date(Date.UTC(n.getUTCFullYear(), n.getUTCMonth(), n.getUTCDate()));
          }
          function addDays(d, n){
            return new Date(d.getTime() + n * 24 * 60 * 60 * 1000);
          }
          function isoDate(d){
            const y = d.getUTCFullYear();
            const m = String(d.getUTCMonth()+1).padStart(2,"0");
            const day = String(d.getUTCDate()).padStart(2,"0");
            return `${y}-${m}-${day}`;
          }

          async function fetchJson(url, key){
            const r = await fetch(url, { headers: { "x-apisports-key": key }});
            const text = await r.text();
            if (!r.ok) throw new Error(`HTTP ${r.status}: ${text.slice(0,300)} | url=${url}`);
            return JSON.parse(text);
          }

          function pickLeagueCandidate(resp, leagueName, country){
            // Prefer exact name match and type=League, else first
            const lcName = leagueName.toLowerCase();
            const lcCountry = country.toLowerCase();

            const candidates = (resp || []).filter(x =>
              (x?.country?.name || "").toLowerCase() === lcCountry
            );

            const exact = candidates.find(x =>
              (x?.league?.name || "").toLowerCase() === lcName &&
              (x?.league?.type || "").toLowerCase() === "league"
            );
            if (exact) return exact;

            const exactAnyType = candidates.find(x =>
              (x?.league?.name || "").toLowerCase() === lcName
            );
            if (exactAnyType) return exactAnyType;

            // fallback: any candidate in that country
            return candidates[0] || resp?.[0] || null;
          }

          function pickSeasonYears(seasons){
            return (seasons || [])
              .map(s => s.year)
              .filter(y => Number.isFinite(y))
              .sort((a,b) => a-b);
          }

          function chooseSeason(seasonYears){
            if (!seasonYears.length) return null;
            if (seasonYears.includes(PREFERRED_SEASON)) return PREFERRED_SEASON;
            // fallback to latest available
            return seasonYears[seasonYears.length - 1];
          }

          function normalizeMatch(ourId, it){
            const date = (it.fixture?.date || "").slice(0,10);
            const home = it.teams?.home?.name || "";
            const away = it.teams?.away?.name || "";
            if (!date || !home || !away) return null;
            return {
              id: `${ourId}_${date}_${home}_vs_${away}`.replace(/\s+/g, "_"),
              date,
              home,
              away
            };
          }

          async function main(){
            const key = process.env.APIFOOTBALL_KEY;
            if (!key) throw new Error("Missing APIFOOTBALL_KEY (GitHub Secret).");

            ensureDir(path.join("data","fixtures"));

            const fromD = todayUTC();
            const toD = addDays(fromD, WINDOW_DAYS);
            const from = isoDate(fromD);
            const to = isoDate(toD);

            const resolved = [];

            for (const t of TARGET_LEAGUES){
              const leaguesUrl = `${API_BASE}/leagues?name=${encodeURIComponent(t.name)}&country=${encodeURIComponent(t.country)}`;
              console.log(`Resolve league: ${t.id} -> ${t.country} / ${t.name}`);
              const leaguesData = await fetchJson(leaguesUrl, key);
              const resp = leaguesData.response || [];

              const picked = pickLeagueCandidate(resp, t.name, t.country);
              if (!picked){
                console.log(`  [WARN] no league found for ${t.id}`);
                // write empty fixtures file
                fs.writeFileSync(
                  path.join("data","fixtures",`${t.id}.json`),
                  JSON.stringify({ leagueId: t.id, leagueName: `${t.country} - ${t.name}`, from, to, matches: [] }, null, 2)
                );
                continue;
              }

              const apiLeagueId = picked.league?.id;
              const apiLeagueName = picked.league?.name;
              const apiCountry = picked.country?.name;

              const seasonYears = pickSeasonYears(picked.seasons);
              const season = chooseSeason(seasonYears);

              resolved.push({
                id: t.id,
                requested: { country: t.country, name: t.name },
                resolved: { apiLeagueId, apiLeagueName, apiCountry, season, seasonYearsTail: seasonYears.slice(-8) }
              });

              if (!apiLeagueId || !season){
                console.log(`  [WARN] missing apiLeagueId/season for ${t.id}`);
                fs.writeFileSync(
                  path.join("data","fixtures",`${t.id}.json`),
                  JSON.stringify({ leagueId: t.id, leagueName: `${t.country} - ${t.name}`, apiLeagueId, season, from, to, matches: [] }, null, 2)
                );
                continue;
              }

              const fixturesUrl =
                `${API_BASE}/fixtures?league=${encodeURIComponent(apiLeagueId)}&season=${encodeURIComponent(season)}&from=${from}&to=${to}`;

              console.log(`  fixtures: league=${apiLeagueId} season=${season} ${from}..${to}`);
              const fx = await fetchJson(fixturesUrl, key);
              const items = fx.response || [];

              const matches = items
                .map(it => normalizeMatch(t.id, it))
                .filter(Boolean);

              fs.writeFileSync(
                path.join("data","fixtures",`${t.id}.json`),
                JSON.stringify({
                  leagueId: t.id,
                  leagueName: `${t.country} - ${t.name}`,
                  apiLeagueId,
                  apiLeagueName,
                  season,
                  generatedAtUTC: new Date().toISOString(),
                  from,
                  to,
                  matches
                }, null, 2)
              );

              console.log(`  saved: data/fixtures/${t.id}.json -> ${matches.length} matches`);
            }

            fs.writeFileSync(
              path.join("data","apifootball_resolved_leagues.json"),
              JSON.stringify({ generatedAtUTC: new Date().toISOString(), preferredSeason: PREFERRED_SEASON, resolved }, null, 2)
            );

            console.log("Done fixtures.");
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      # ---------------------------
      # Build history/leagues (football-data)
      # ---------------------------
      - name: Build history/leagues (football-data)
        run: node scripts/build-data.js

      # ---------------------------
      # Build fixtures (API-Football)
      # ---------------------------
      - name: Build fixtures (API-Football)
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: node scripts/apifootball-build-fixtures-auto.js

      # ---------------------------
      # Commit changes
      # ---------------------------
      - name: Commit & push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/index.json data/leagues data/history data/corners data/cards data/fixtures data/apifootball_resolved_leagues.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Daily data update"
          git push
