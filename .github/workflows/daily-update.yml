name: Daily data update

on:
  schedule:
    - cron: "15 3 * * *"   # daily 03:15 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build history/results JSON (football-data)
        run: node scripts/build-data.js

      - name: Build fixtures JSON (TheSportsDB)
        env:
          SPORTSDB_KEY: ${{ secrets.SPORTSDB_KEY }}
        run: node scripts/build-fixtures-sportsdb.js

      - name: Commit changes
        run: 
          node scripts/build-data.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.json data/leagues data/history data/corners data/cards data/fixtures
          git diff --cached --quiet || git commit -m "Daily data update"
          git push
