name: OddsPapi - run jobs

on:
  workflow_dispatch:
    inputs:
      job:
        description: "What to run"
        required: true
        default: "odds"
        type: choice
        options:
          - bookmakers
          - tournaments
          - odds
          - build_ui
          - report
      tournament_ids:
        description: "Comma-separated tournamentIds (for odds job)"
        required: false
        default: "17"
      bookmaker:
        description: "Bookmaker slug (for odds job)"
        required: false
        default: "superbet"
      verbosity:
        description: "Verbosity level (for odds job)"
        required: false
        default: "2"
      odds_format:
        description: "decimal or american (for odds job)"
        required: false
        default: "decimal"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Run bookmakers
        if: ${{ inputs.job == 'bookmakers' }}
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: node scripts/oddspapi-fetch-bookmakers.js

      - name: Run tournaments
        if: ${{ inputs.job == 'tournaments' }}
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: node scripts/oddspapi-fetch-tournaments.js

      - name: Run odds-by-tournaments (batched)
        if: ${{ inputs.job == 'odds' }}
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
          TOURNAMENT_IDS: ${{ inputs.tournament_ids }}
          BOOKMAKER: ${{ inputs.bookmaker }}
          VERBOSITY: ${{ inputs.verbosity }}
          ODDS_FORMAT: ${{ inputs.odds_format }}
        run: node scripts/oddspapi-fetch-odds-by-tournaments.js

      - name: Build UI data (normalize OddsPapi) - after odds
        if: ${{ inputs.job == 'odds' }}
        run: node scripts/build-ui-data-from-oddspapi.js

      - name: Build UI data (normalize OddsPapi) - NO API (rebuild from existing oddspapi_odds.json)
        if: ${{ inputs.job == 'build_ui' }}
        run: node scripts/build-ui-data-from-oddspapi.js

      - name: Build 2-way report (no API calls)
        if: ${{ inputs.job == 'report' }}
        run: node scripts/build-two-way-report.js

      - name: List generated files (debug)
        run: |
          echo "---- data/ui ----"
          ls -la data/ui || true
          echo "---- data/ui/match ----"
          ls -la data/ui/match | head -n 20 || true

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # bookmakers / tournaments
          git add data/oddspapi_bookmakers_raw.txt data/oddspapi_bookmakers.json || true
          git add data/oddspapi_tournaments_raw.txt data/oddspapi_tournaments.json || true

          # odds outputs
          git add data/oddspapi_odds.json data/oddspapi_odds_index.json || true
          git add data/oddspapi_odds_parts || true

          # UI normalized outputs
          git add data/ui || true

          # report output
          git add data/ui/two_way_report.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "OddsPapi data update"
          git push
